name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: SmartChineseSubtitlePlayer
  SCHEME: SmartChineseSubtitlePlayer

jobs:
  build:
    name: Build iOS Simulator
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version
          ls /Applications/Xcode*.app 2>/dev/null || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: List generated project
        run: |
          ls -la "${PROJECT_NAME}.xcodeproj/"
          echo "--- project.pbxproj first 30 lines ---"
          head -30 "${PROJECT_NAME}.xcodeproj/project.pbxproj"

      - name: Build
        run: |
          xcodebuild \
            -project "${PROJECT_NAME}.xcodeproj" \
            -scheme "${SCHEME}" \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -100

      - name: Locate app bundle
        run: |
          find ./DerivedData -name "*.app" -type d 2>/dev/null || echo "No .app found"
          find ./DerivedData/Build -maxdepth 4 -type d 2>/dev/null || true

      - name: Package artifact
        run: |
          APP_PATH=$(find ./DerivedData -name "${PROJECT_NAME}.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP_PATH" ]; then
            zip -r "${PROJECT_NAME}-Simulator.zip" "$APP_PATH"
            echo "Packaged: $(ls -lh ${PROJECT_NAME}-Simulator.zip)"
          fi

      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PROJECT_NAME }}-Simulator"
          path: "${{ env.PROJECT_NAME }}-Simulator.zip"
          retention-days: 7
