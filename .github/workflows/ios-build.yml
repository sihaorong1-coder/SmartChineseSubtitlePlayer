name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: SmartChineseSubtitlePlayer
  SCHEME: SmartChineseSubtitlePlayer

jobs:
  # ============================================================
  # Job 1: 模拟器构建（始终运行，验证编译）
  # ============================================================
  build-simulator:
    name: 🔨 Simulator Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer 2>/dev/null || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build for Simulator
        run: |
          xcodebuild \
            -project "${PROJECT_NAME}.xcodeproj" \
            -scheme "${SCHEME}" \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -50

      - name: Package
        run: |
          APP=$(find ./DerivedData -name "${PROJECT_NAME}.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            zip -r "${PROJECT_NAME}-Simulator.zip" "$APP"
            echo "Size: $(du -sh ${PROJECT_NAME}-Simulator.zip | cut -f1)"
          else
            echo "No .app found"
          fi

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PROJECT_NAME }}-Simulator"
          path: "${{ env.PROJECT_NAME }}-Simulator.zip"
          retention-days: 7

  # ============================================================
  # Job 2: 真机 Archive（手动触发或 push 时可选）
  # 产物可在 Actions 页面的 Artifacts 下载，用 AltStore 签名安装
  # ============================================================
  build-device:
    name: 📱 Device Archive
    runs-on: macos-latest
    # 同时触发：每次 push 都跑，不需要手动触发
    # if: false  ← 如果不想每次 push 都跑 Archive，取消下面注释

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer 2>/dev/null || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      # ----------------------------------------------------------
      # Step A: 无条件 Archive（不签名也能生成 .xcarchive）
      # ----------------------------------------------------------
      - name: Archive
        run: |
          xcodebuild archive \
            -project "${PROJECT_NAME}.xcodeproj" \
            -scheme "${SCHEME}" \
            -destination 'generic/platform=iOS' \
            -archivePath "./build/${PROJECT_NAME}.xcarchive" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" 2>&1 | tail -30

          echo "--- checking .xcarchive ---"
          ls -la "./build/${PROJECT_NAME}.xcarchive/Products/Applications/" 2>/dev/null || echo "No .app in archive"

      # ----------------------------------------------------------
      # Step B: 如果配置了证书 Secrets，导出签名 IPA
      # ----------------------------------------------------------
      - name: Setup Signing (optional)
        id: signing
        run: |
          if [ -z "${{ secrets.P12_CERTIFICATE_BASE64 }}" ]; then
            echo "SKIP_SIGNING=true" >> $GITHUB_OUTPUT
            echo "⚠️  未配置签名证书，将跳过 IPA 导出"
            echo "   产物仅包含 .xcarchive（可用 AltStore 侧载 .app）"
          else
            echo "SKIP_SIGNING=false" >> $GITHUB_OUTPUT
            echo "🔐 正在配置签名..."

            KEYCHAIN_PATH="$RUNNER_TEMP/smartplayer.keychain-db"
            security create-keychain -p "temp123" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "temp123" "$KEYCHAIN_PATH"
            security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

            echo "${{ secrets.P12_CERTIFICATE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/cert.p12"
            security import "$RUNNER_TEMP/cert.p12" \
              -k "$KEYCHAIN_PATH" \
              -P "${{ secrets.P12_PASSWORD }}" \
              -T /usr/bin/codesign

            security set-key-partition-list -S apple-tool:,apple: \
              -s -k "temp123" "$KEYCHAIN_PATH"

            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            echo "${{ secrets.MOBILEPROVISION_BASE64 }}" | base64 -d > \
              ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

            echo "✅ 签名配置完成"
          fi

      - name: Export IPA (signed)
        if: steps.signing.outputs.SKIP_SIGNING != 'true'
        run: |
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>teamID</key>
              <string>${{ secrets.DEVELOPMENT_TEAM }}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "./build/${PROJECT_NAME}.xcarchive" \
            -exportPath "./build/IPA" \
            -exportOptionsPlist ExportOptions.plist 2>&1 | tail -10

          echo "IPA: $(ls -lh ./build/IPA/*.ipa 2>/dev/null)"

      # ----------------------------------------------------------
      # 上传产物
      # ----------------------------------------------------------
      - name: Package .xcarchive
        run: |
          zip -r "${PROJECT_NAME}-Device.xcarchive.zip" "./build/${PROJECT_NAME}.xcarchive"

      - name: Upload .xcarchive (可用于 AltStore)
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PROJECT_NAME }}-Device-Archive"
          path: "${{ env.PROJECT_NAME }}-Device.xcarchive.zip"
          retention-days: 7

      - name: Upload IPA (if signed)
        if: steps.signing.outputs.SKIP_SIGNING != 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PROJECT_NAME }}-Signed.ipa"
          path: ./build/IPA/*.ipa
          retention-days: 30
