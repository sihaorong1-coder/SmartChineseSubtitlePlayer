name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_NAME: SmartChineseSubtitlePlayer
  SCHEME: SmartChineseSubtitlePlayer

jobs:
  # ============================================================
  # Job 1: 模拟器构建（验证编译通过）
  # ============================================================
  build-simulator:
    name: 🔨 Simulator Build
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer 2>/dev/null || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build for Simulator
        run: |
          xcodebuild \
            -project "${PROJECT_NAME}.xcodeproj" \
            -scheme "${SCHEME}" \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -50

      - name: Package
        run: |
          APP=$(find ./DerivedData -name "${PROJECT_NAME}.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            zip -r "${PROJECT_NAME}-Simulator.zip" "$APP"
            echo "Size: $(du -sh ${PROJECT_NAME}-Simulator.zip | cut -f1)"
          else
            echo "No .app found"
          fi

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PROJECT_NAME }}-Simulator"
          path: "${{ env.PROJECT_NAME }}-Simulator.zip"
          retention-days: 7

  # ============================================================
  # Job 2: 真机 .app（不需签名，直接用 AltStore 侧载）
  # ============================================================
  build-device:
    name: 📱 Device .app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer 2>/dev/null || true
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Build for Device
        run: |
          xcodebuild \
            -project "${PROJECT_NAME}.xcodeproj" \
            -scheme "${SCHEME}" \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ./DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -50

      - name: Package .app
        run: |
          APP=$(find ./DerivedData -name "${PROJECT_NAME}.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "ERROR: No .app found"
            exit 1
          fi
          echo "App found: $APP"
          echo "Contents:"
          ls -la "$APP"
          echo "Binary arch:"
          file "$APP/${PROJECT_NAME}" 2>/dev/null || file "$APP"/*/Info.plist 2>/dev/null || true
          zip -r "${PROJECT_NAME}-Device.zip" "$APP"
          echo "Package size: $(du -sh ${PROJECT_NAME}-Device.zip | cut -f1)"

      - name: Upload Device .app
        uses: actions/upload-artifact@v4
        with:
          name: "${{ env.PROJECT_NAME }}-Device"
          path: "${{ env.PROJECT_NAME }}-Device.zip"
          retention-days: 7
