# ============================================================
# XcodeGen 项目配置文件
#
# 用法（在 macOS 或 CI 环境中）：
#   brew install xcodegen
#   xcodegen generate
#
# 这将在当前目录生成 SmartChineseSubtitlePlayer.xcodeproj
# ============================================================

name: SmartChineseSubtitlePlayer

# 项目级别的编译设置
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"          # iPhone only
    INFOPLIST_FILE: "SmartChineseSubtitlePlayer/App/Info.plist"
    PRODUCT_BUNDLE_IDENTIFIER: com.smartplayer.subtitleplayer
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # TODO: 替换为你的 Bundle Identifier
    # PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.smartplayer

  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_USER_SCRIPT_SANDBOXING: "YES"
      CODE_SIGN_STYLE: Automatic
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_USER_SCRIPT_SANDBOXING: "YES"
      CODE_SIGN_STYLE: Automatic
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: "-O"

# ============================================================
# Target 定义
# ============================================================
targets:
  SmartChineseSubtitlePlayer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # 源文件（按目录组织，自动创建 Xcode 中的 Group）
    sources:
      # App 入口
      - path: SmartChineseSubtitlePlayer/App
        group: App
        type: group

      # 数据模型
      - path: SmartChineseSubtitlePlayer/Models
        group: Models
        type: group

      # 业务服务
      - path: SmartChineseSubtitlePlayer/Services
        group: Services
        type: group

      # ViewModels
      - path: SmartChineseSubtitlePlayer/ViewModels
        group: ViewModels
        type: group

      # Views
      - path: SmartChineseSubtitlePlayer/Views
        group: Views
        type: group

      # 工具扩展
      - path: SmartChineseSubtitlePlayer/Utils
        group: Utils
        type: group

      # 资源文件 (Assets.xcassets 放在 Resources 目录)
      - path: SmartChineseSubtitlePlayer/Resources
        group: Resources
        type: group

    # Info.plist 路径
    info:
      path: SmartChineseSubtitlePlayer/App/Info.plist

    # Build Settings
    settings:
      base:
        PRODUCT_NAME: SmartChineseSubtitlePlayer
        PRODUCT_BUNDLE_IDENTIFIER: com.smartplayer.subtitleplayer
        INFOPLIST_FILE: SmartChineseSubtitlePlayer/App/Info.plist
        # Swift 编译选项
        SWIFT_VERSION: "5.9"
        # 支持的方向
        UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"

        # TODO: CI 环境 CODE_SIGN_STYLE 设置为 Manual 并用空配置文件
        # 本地开发（Mac 上）使用 Automatic
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: ""

    # 预编译脚本 — 无

    # 后编译脚本 — 无

    # 依赖 — 使用系统框架（AVKit, Speech, NaturalLanguage 等由 Swift 自动链接）

# ============================================================
# 方案（Scheme）
# ============================================================
schemes:
  SmartChineseSubtitlePlayer:
    build:
      targets:
        SmartChineseSubtitlePlayer: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
