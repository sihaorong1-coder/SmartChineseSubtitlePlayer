name: SmartChineseSubtitlePlayer

options:
  deploymentTarget:
    iOS: "17.0"

targets:
  SmartChineseSubtitlePlayer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: SmartChineseSubtitlePlayer
        excludes:
          - "App/Info.plist"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartplayer.subtitleplayer
        INFOPLIST_FILE: SmartChineseSubtitlePlayer/App/Info.plist
